<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#091a14"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50dca0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7b6ff0;stop-opacity:0.08"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#50dca0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blob -->
  <ellipse cx="600" cy="280" rx="500" ry="300" fill="url(#radial)"/>

  <!-- Subtle grid lines -->
  <g stroke="#50dca0" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Card backdrop -->
  <rect x="80" y="80" width="1040" height="470" rx="20" fill="rgba(10,20,35,0.7)" stroke="#50dca0" stroke-opacity="0.15" stroke-width="1.5"/>
  <!-- Top shimmer line -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="url(#glow)" stroke-width="1.5" rx="20"/>

  <!-- Aurora rings decoration -->
  <circle cx="980" cy="180" r="80" fill="none" stroke="#50dca0" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="980" cy="180" r="55" fill="none" stroke="#50dca0" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="980" cy="180" r="30" fill="none" stroke="#50dca0" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Widget preview dots -->
  <g fill="none" stroke="#50dca0" stroke-opacity="0.2" stroke-width="1">
    <rect x="120" y="400" width="160" height="110" rx="8"/>
    <rect x="300" y="400" width="160" height="110" rx="8"/>
    <rect x="480" y="400" width="160" height="110" rx="8"/>
    <rect x="660" y="400" width="160" height="110" rx="8"/>
    <rect x="840" y="400" width="240" height="110" rx="8"/>
  </g>
  <!-- Widget label lines -->
  <g fill="#50dca0" fill-opacity="0.2">
    <rect x="136" y="416" width="60" height="4" rx="2"/>
    <rect x="316" y="416" width="60" height="4" rx="2"/>
    <rect x="496" y="416" width="60" height="4" rx="2"/>
    <rect x="676" y="416" width="60" height="4" rx="2"/>
    <rect x="856" y="416" width="80" height="4" rx="2"/>
  </g>

  <!-- Main title -->
  <text x="140" y="230" font-family="'DM Mono', 'Courier New', monospace" font-size="14" font-weight="400" letter-spacing="6" fill="#50dca0" fill-opacity="0.8">PERSONAL DASHBOARD</text>
  <text x="136" y="340" font-family="Georgia, serif" font-size="96" font-weight="200" letter-spacing="-2" fill="#e8f4f0">Aurora</text>

  <!-- Tagline -->
  <text x="140" y="380" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#7a9e92" letter-spacing="1">Weather · KP Index · Music · Wildlife · Chat · Dice · and more</text>

  <!-- KP indicator accent -->
  <rect x="140" y="155" width="3" height="48" rx="1.5" fill="#50dca0"/>

  <!-- Bottom URL -->
  <text x="140" y="558" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#7a9e92" fill-opacity="0.6" letter-spacing="1">bloqhead.github.io/aurora-landing-page</text>
</svg>
