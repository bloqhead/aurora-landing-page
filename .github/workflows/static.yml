name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject build version
        run: |
          mkdir -p dist
          cp -r . dist/ 2>/dev/null || true
          sed -i "s/__BUILD_VERSION__/${{ github.sha }}/g" dist/index.html
          sed -i "s/__BUILD_VERSION__/${{ github.sha }}/g" dist/sw.js
          grep "${{ github.sha }}" dist/index.html && echo "✓ Substitution verified"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
