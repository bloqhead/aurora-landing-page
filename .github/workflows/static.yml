name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject build version
        run: |
          BUILD="${{ github.sha }}"
          sed -i "s|__BUILD_VERSION__|${BUILD}|g" index.html
          sed -i "s|__BUILD_VERSION__|${BUILD}|g" sw.js
          echo "index.html contains SHA: $(grep -c ${BUILD} index.html) times"
          echo "--- relevant lines ---"
          grep "aurora" index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
