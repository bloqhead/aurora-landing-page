name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject build version
        run: |
          sed -i "s|__BUILD_VERSION__|${{ github.sha }}|g" index.html
          sed -i "s|__BUILD_VERSION__|${{ github.sha }}|g" sw.js
          grep -q "${{ github.sha }}" index.html || (echo "ERROR: substitution failed" && exit 1)
          echo "✓ Build version injected: ${{ github.sha }}"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
